name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name for the release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            circuits_arch: linux-x86_64
            cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            circuits_arch: linux-aarch64
            cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            circuits_arch: macos-aarch64
            cross: false
          - os: macos-13
            target: x86_64-apple-darwin
            circuits_arch: macos-aarch64  # no x86_64 macOS circuits release; build-only use
            cross: false

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.0"
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # The logos-blockchain-pol build script requires the circuits directory.
      # Download the matching release from the logos-blockchain releases page.
      - name: Download ZK circuits
        shell: bash
        run: |
          CIRCUITS_VERSION="v0.4.2"
          ARCH="${{ matrix.circuits_arch }}"
          URL="https://github.com/logos-blockchain/logos-blockchain/releases/download/0.1.2/logos-blockchain-circuits-${CIRCUITS_VERSION}-${ARCH}.tar.gz"
          DEST="${HOME}/.logos-blockchain-circuits"
          mkdir -p "${DEST}"
          echo "Downloading circuits from ${URL}"
          curl -fL "${URL}" | tar -xz -C "${DEST}" --strip-components=1
          echo "Circuits installed to ${DEST}"
          cat "${DEST}/VERSION" || true

      - name: Install musl-tools (x86_64 Linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build
        env:
          LOGOS_BLOCKCHAIN_CIRCUITS: ${{ env.HOME }}/.logos-blockchain-circuits
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            LOGOS_BLOCKCHAIN_CIRCUITS="${HOME}/.logos-blockchain-circuits" cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package
        shell: bash
        run: |
          BINARY=zone-board
          TARGET=${{ matrix.target }}
          TAG=${{ github.ref_name }}${{ github.event.inputs.tag }}
          ARCHIVE="${BINARY}-${TAG}-${TARGET}.tar.gz"
          tar -C "target/${TARGET}/release" -czf "${ARCHIVE}" "${BINARY}"
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Create/update GitHub release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}${{ github.event.inputs.tag }}
          name: ${{ github.ref_name }}${{ github.event.inputs.tag }}
          draft: false
          prerelease: false
          files: ${{ env.ARCHIVE }}
