name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name for the release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            cross: false
          - os: macos-13
            target: x86_64-apple-darwin
            cross: false

    steps:
      - uses: actions/checkout@v4

      # rust-toolchain.toml pins the channel; dtolnay/rust-toolchain reads it automatically
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.0"
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl-tools (x86_64 Linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package
        shell: bash
        run: |
          BINARY=zone-board
          TARGET=${{ matrix.target }}
          TAG=${{ github.ref_name }}${{ github.event.inputs.tag }}
          ARCHIVE="${BINARY}-${TAG}-${TARGET}.tar.gz"
          tar -C "target/${TARGET}/release" -czf "${ARCHIVE}" "${BINARY}"
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Create/update GitHub release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}${{ github.event.inputs.tag }}
          name: ${{ github.ref_name }}${{ github.event.inputs.tag }}
          draft: false
          prerelease: false
          files: ${{ env.ARCHIVE }}
